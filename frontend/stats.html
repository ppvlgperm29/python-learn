<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Статистика — Python Learn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css?v=6">
  <link rel="stylesheet" href="/css/animations.css?v=6">
  <link rel="stylesheet" href="/css/main.css?v=6">
  <link rel="stylesheet" href="/css/sidebar.css?v=6">
  <link rel="stylesheet" href="/css/stats.css?v=6">
</head>
<body>
  <div class="mobile-header">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
    <a href="/" class="mobile-header__logo">
      <span class="sidebar__logo-icon">PY</span>
      Python Learn
    </a>
  </div>
  <div class="sidebar-overlay" onclick="closeSidebar()"></div>

  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="sidebar__logo">
        <div class="sidebar__logo-text">
          <span class="sidebar__logo-icon">PY</span>
          Python Learn
        </div>
        <div class="sidebar__logo-sub">Интерактивный курс</div>
      </a>
      <nav class="sidebar__nav">
        <a class="nav-item nav-item--practice" href="/practice.html">
          <span class="nav-item__num">⚡</span>
          <span class="nav-item__title">Практика</span>
          <span class="nav-item__badge nav-item__badge--progress" id="practice-nav-badge"></span>
        </a>
        <a class="nav-item active" href="/stats.html">
          <span class="nav-item__num">📊</span>
          <span class="nav-item__title">Статистика</span>
        </a>
        <div class="sidebar__section-label">Темы</div>
        <div id="sidebar-nav"></div>
      </nav>
      <div class="sidebar__footer" id="sidebar-footer"><span>12 тем · для начинающих</span><button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☾ Тёмная</button></div>
    </aside>

    <main class="main-content">
      <div class="content-inner" id="stats-container">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>Загрузка...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/theme.js?v=6"></script>
  <script src="/js/api.js?v=6"></script>
  <script src="/js/stats.js?v=6"></script>
  <script>
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-overlay').classList.toggle('active');
    }
    function closeSidebar() {
      document.querySelector('.sidebar').classList.remove('open');
      document.querySelector('.sidebar-overlay').classList.remove('active');
    }
  </script>
</body>
</html>
