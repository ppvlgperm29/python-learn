<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тема — Python Learn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Prism.js — тема GitHub -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">

  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">

  <link rel="stylesheet" href="/css/variables.css?v=2">
  <link rel="stylesheet" href="/css/animations.css?v=2">
  <link rel="stylesheet" href="/css/main.css?v=2">
  <link rel="stylesheet" href="/css/sidebar.css?v=2">
  <link rel="stylesheet" href="/css/theory.css?v=2">
  <link rel="stylesheet" href="/css/tasks.css?v=2">
</head>
<body>
  <div class="mobile-header">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
    <a href="/" class="mobile-header__logo">
      <span class="sidebar__logo-icon">PY</span>
      Python Learn
    </a>
  </div>
  <div class="sidebar-overlay" onclick="closeSidebar()"></div>

  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="sidebar__logo">
        <div class="sidebar__logo-text">
          <span class="sidebar__logo-icon">PY</span>
          Python Learn
        </div>
        <div class="sidebar__logo-sub">Интерактивный курс</div>
      </a>
      <nav class="sidebar__nav">
        <div class="sidebar__section-label">Темы</div>
        <div id="sidebar-nav"></div>
      </nav>
      <div class="sidebar__footer" id="sidebar-footer">4 темы · для начинающих</div>
    </aside>

    <main class="main-content">
      <div id="topic-container">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>Загрузка...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

  <!-- CodeMirror -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

  <!-- Prism.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>

  <script src="/js/api.js?v=2"></script>
  <script src="/js/pyodide-runner.js?v=2"></script>
  <script src="/js/topic.js?v=2"></script>
  <script>
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-overlay').classList.toggle('active');
    }
    function closeSidebar() {
      document.querySelector('.sidebar').classList.remove('open');
      document.querySelector('.sidebar-overlay').classList.remove('active');
    }
  </script>
</body>
</html>
